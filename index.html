<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural Digital da Escola</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        header {
            background: #020617;
            text-align: center;
            padding: 20px;
            font-size: 28px;
            border-bottom: 2px solid #1e293b;
        }

        .login {
            text-align: center;
            padding: 20px;
        }

        select,
        input,
        textarea {
            width: 90%;
            max-width: 400px;
            padding: 10px;
            margin: 6px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 6px;
        }

        button {
            padding: 10px 15px;
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin: auto;
        }

        .postar {
            display: none;
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .mural {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .aviso {
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.6);
        }

        .conteudo {
            padding: 12px;
        }

        .data {
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        📢 Mural Digital da Escola
    </header>

    <div class="login">

        <h3>Acesso</h3>

        <select id="tipo">
            <option value="aluno">Aluno</option>
            <option value="professor">Professor</option>
            <option value="diretoria">Diretoria</option>
        </select>

        <br>

        <input type="password" id="senha" placeholder="Senha (aluno não precisa)">

        <br>

        <button onclick="login()">Entrar</button>

    </div>

    <div class="container">

        <div class="postar" id="postar">

            <h3>Novo Aviso</h3>

            <input type="text" id="titulo" placeholder="Título"><br>
            <input type="date" id="data"><br>

            <textarea id="texto" placeholder="Digite o aviso"></textarea><br>

            <button onclick="publicar()">Publicar Aviso</button>

        </div>

        <h2>📌 Avisos</h2>

        <div class="mural" id="mural"></div>

    </div>

    <script>

        let avisos = JSON.parse(localStorage.getItem("avisos")) || [];

        function login() {

            let tipo = document.getElementById("tipo").value;
            let senha = document.getElementById("senha").value;

            if (tipo === "professor" && senha !== "professores123") {
                alert("Senha do professor incorreta");
                return;
            }

            if (tipo === "diretoria" && senha !== "diretoria123") {
                alert("Senha da diretoria incorreta");
                return;
            }

            document.querySelector(".login").style.display = "none";

            if (tipo === "professor" || tipo === "diretoria") {
                document.getElementById("postar").style.display = "block";
            }

            carregarAvisos();

        }

        function publicar() {

            let titulo = document.getElementById("titulo").value;
            let texto = document.getElementById("texto").value;
            let data = document.getElementById("data").value;

            if (!titulo || !texto) {
                alert("Preencha título e texto");
                return;
            }

            avisos.push({
                titulo: titulo,
                texto: texto,
                data: data
            });

            localStorage.setItem("avisos", JSON.stringify(avisos));

            carregarAvisos();

        }

        function carregarAvisos() {

            let mural = document.getElementById("mural");

            mural.innerHTML = "";

            avisos.forEach(aviso => {

                let div = document.createElement("div");

                div.className = "aviso";

                div.innerHTML = `
<div class="conteudo">
<h3>${aviso.titulo}</h3>
<p class="data">📅 ${aviso.data}</p>
<p>${aviso.texto}</p>
</div>
`;

                mural.prepend(div);

            });

        }

    </script>

</body>

</html>
